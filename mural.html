<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mural de Postagens - Prodígios do Basquete</title>
  <link rel="stylesheet" href="mural.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Poetsen+One&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1><img src="/img/icons8-blackboard-50.png" width="40" height="40" alt="mural"> Mural de Postagens</h1>
    <a href="index.html" class="voltar-btn">← Voltar ao Início</a>
  </header>

  <main>
    <section class="formulario-section">
      <h2>Nova Postagem</h2>
      <form id="postagemForm">
        <div class="form-group">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" placeholder="Seu nome" required />
        </div>
        
        <div class="form-group">
          <label for="titulo">Título da Postagem:</label>
          <input type="text" id="titulo" placeholder="Título da sua postagem" required />
        </div>
        
        <div class="form-group">
          <label for="conteudo">Conteúdo:</label>
          <textarea id="conteudo" placeholder="Compartilhe suas conquistas, treinos, eventos ou qualquer novidade do basquete!" rows="4" required></textarea>
        </div>
        
        <div class="form-group">
          <label for="categoria">Categoria:</label>
          <select id="categoria">
            <option value="Evento">Evento</option>
            <option value="Treino">Treino</option>
            <option value="Conquista">Conquista</option>
            <option value="Dica">Dica</option>
            <option value="Uniforme">Uniforme</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        
        <button type="submit">Publicar Postagem</button>
      </form>
    </section>

    <section class="mural-section">
      <h2>Mural de Publicações</h2>
      <div class="filtros">
        <button class="filtro-btn ativo" data-categoria="todos">Todos</button>
        <button class="filtro-btn" data-categoria="Evento">Eventos</button>
        <button class="filtro-btn" data-categoria="Treino">Treinos</button>
        <button class="filtro-btn" data-categoria="Conquista">Conquistas</button>
        <button class="filtro-btn" data-categoria="Dica">Dicas</button>
      </div>
      
      <div id="listaPostagens" class="postagens-container">
        <!-- As postagens serão criadas dinamicamente aqui -->
      </div>
    </section>
    </main>

  <script src="mural.js"></script>
</body>
</html>
