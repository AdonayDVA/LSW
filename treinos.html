<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejador de Treino de Basquete</title>
  <link rel="stylesheet" href="treinos.css" />
</head>
<body>
  <div class="container">
    <h1><img src="img/icons8-basketball.gif" width="40" height="40" alt="basquete"> Planejador de Treino de Basquete</h1>

    <section>
      <h2>Adicionar Novo Treino</h2>
      <form id="treinoForm">
        <div class="form-group">
          <label for="nome">Nome do Exercício</label>
          <input type="text" id="nome" placeholder="Nome do exercício" required />
        </div>
        <div class="form-group">
          <label for="categoria">Categoria</label>
          <select id="categoria">
            <option value="Aquecimento">Aquecimento</option>
            <option value="Arremesso">Arremesso</option>
            <option value="Defesa">Defesa</option>
            <option value="Drible">Drible</option>
            <option value="Condicionamento">Condicionamento</option>
          </select>
        </div>
        <div class="form-group">
          <label for="repeticoes">Repetições</label>
          <input type="number" id="repeticoes" placeholder="Repetições" required />
        </div>
        <div class="form-group">
          <label for="series">Séries</label>
          <input type="number" id="series" placeholder="Séries" required />
        </div>
        <button type="submit">Adicionar Treino</button>
      </form>
    </section>

    <section>
      <h2>Treinos Planejados</h2>
      <div class="treino-image">
        <img src="img/icons8-training-50.png" width="60" height="60" alt="treino">
      </div>
      <ul id="listaTreinos"></ul>
    </section>
  </div>

  <script src="treinos.js"></script>
</body>
</html>
